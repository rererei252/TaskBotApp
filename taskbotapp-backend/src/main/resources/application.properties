spring.application.name=taskbot

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/taskkan_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Mail (Brevo / Resend SMTP)
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Auth mail verification
app.auth.mail-from=${APP_MAIL_FROM:no-reply@taskkan.local}
app.auth.verify-base-url=${APP_VERIFY_BASE_URL:http://localhost:5173/auth/verify}
app.auth.verification-expire-hours=${APP_VERIFICATION_EXPIRE_HOURS:24}

# Password reset mail
app.auth.reset-base-url=http://localhost:5173/auth/password-reset
app.auth.password-reset-expire-minutes=30

# OpenAI
app.ai.openai.api-key=${OPENAI_API_KEY:}
app.ai.openai.model=${OPENAI_MODEL:gpt-5-mini}
app.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.ai.recommendation-window-days=${AI_RECOMMENDATION_WINDOW_DAYS:14}

# Session and Cookie settiong
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=lax
